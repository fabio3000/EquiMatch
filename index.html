<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>The Plot | Your life is a movie.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- BASIS & FILMIC AESTHETICS (FROM OLD CODE) --- */
        html, body { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background-color: #09090b; color: #f4f4f5; 
            background-image: radial-gradient(circle at 50% 0%, #27272a 0%, #09090b 70%); 
            min-height: 100vh; width: 100vw; overflow-x: hidden; touch-action: pan-y;
            -webkit-text-size-adjust: 100%;
        }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }

        .film-grain { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            pointer-events: none; z-index: 50; opacity: 0.04; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); 
        }

        .gold-text { background: linear-gradient(to right, #fbbf24, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .paper-texture { position: relative; }
        .paper-texture::after { 
            content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 10; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='paperNoise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23paperNoise)' opacity='0.08'/%3E%3C/svg%3E"); 
            mix-blend-mode: multiply; border-radius: inherit; 
        }

        /* --- TICKET SYSTEM (STUB DRAGGING) --- */
        .ticket-wrapper { display: flex; perspective: 1000px; position: relative; gap: 2px; user-select: none; margin: 20px auto; max-width: 95%; }
        .ticket-main { flex: 1; background: #e4e4e7; border-radius: 16px 0 0 16px; padding: 32px; position: relative; box-shadow: -5px 10px 30px rgba(0,0,0,0.5); border-right: 3px dashed #9ca3af; overflow: hidden; color: #18181b; }
        .ticket-stub { width: 80px; background: #d4d4d8; border-radius: 0 16px 16px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: grab; box-shadow: 5px 10px 30px rgba(0,0,0,0.5); transform-origin: top left; touch-action: none; overflow: hidden; }
        .ticket-stub-text { writing-mode: vertical-rl; transform: rotate(180deg); color: #52525b; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; font-size: 14px; }
        .torn-edge { background-image: radial-gradient(circle at 5px 0, transparent 6px, #e4e4e7 7px); background-size: 16px 10px; background-repeat: repeat-x; height: 10px; width: 100%; position: absolute; top: -10px; left: 0; transform: rotate(180deg); }

        /* --- UI HELPERS --- */
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .progress-bar-smooth { transition: width 1s linear; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        
        .chat-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="flex flex-col relative overflow-x-hidden">
    <div class="film-grain"></div>
    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>
    <div id="recaptcha-container"></div>
    
    <div id="app" class="min-h-screen flex flex-col relative z-10 pb-20"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, updateDoc, deleteDoc, query, where, arrayUnion, arrayRemove, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURATION (VON DIR ÜBERNOMMEN) ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'the-plot-official';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { projectId: "demo" };
        const apiKey = ""; // Wird von der Umgebung gesetzt
        const CITIES = ["Köln", "Berlin", "Hamburg", "München", "Paderborn"];
        const ROLES = ["Der Beobachter", "Der Provokateur", "Die Stimme der Vernunft", "Der Geheimnisträger", "Der mutige Fremde", "Der Zweifler"];

        // --- APP STATE ---
        let state = {
            user: null, profile: null, currentDrop: null, allDrops: [],
            view: 'loading', selectedCity: "Köln", authStep: 'phone',
            isRevealing: false, isAdmin: false, isAiLoading: false,
            myRole: null, myAlias: null, logoClicks: 0, tempPhone: '',
            messages: []
        };

        // --- FIREBASE INIT ---
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CORE ACTIONS ---
        window.sendSMS = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('auth_submit_btn');
            const fullPhone = document.getElementById('auth_prefix').value + document.getElementById('auth_phone').value.trim().replace(/^0+/, '');
            state.tempPhone = fullPhone;
            btn.disabled = true; btn.innerText = "Sende...";

            try {
                if (!window.recaptchaVerifier) window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' });
                window.confirmationResult = await signInWithPhoneNumber(auth, fullPhone, window.recaptchaVerifier);
                state.authStep = 'code'; render(true);
            } catch (err) { window.showToast(err.message, "error"); btn.disabled = false; btn.innerText = "SMS senden"; }
        };

        window.verifyCode = async (e) => {
            e.preventDefault();
            const code = document.getElementById('auth_code').value;
            try {
                await window.confirmationResult.confirm(code);
                if (window.recaptchaVerifier) { window.recaptchaVerifier.clear(); window.recaptchaVerifier = null; }
            } catch (err) { window.showToast("Ungültiger Code.", "error"); }
        };

        window.generateAIPlot = async () => {
            const theme = document.getElementById('admin_theme')?.value || "Samstagabend";
            state.isAiLoading = true; render(true);
            try {
                const sys = `Du bist der 'Director'. Erstelle 10 'Scenes' für ein reales Treffen. Format: JSON { "title": "...", "vibe": "...", "scenes": [ { "text": "...", "vibe": "..." } ] }`;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', body: JSON.stringify({
                        contents: [{ parts: [{ text: `Thema: ${theme} in ${state.selectedCity}` }] }],
                        systemInstruction: { parts: [{ text: sys }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                const res = JSON.parse(data.candidates[0].content.parts[0].text);
                document.getElementById('admin_title').value = res.title;
                document.getElementById('admin_vibe').value = res.vibe;
                document.getElementById('admin_scenes').value = res.scenes.map(s => s.text).join('\n');
                window.showToast("Plot generiert.", "success");
            } catch (e) { window.showToast("KI Fehler", "error"); }
            finally { state.isAiLoading = false; render(true); }
        };

        window.createDrop = async (e) => {
            e.preventDefault();
            const dropId = 'drop_' + Date.now();
            const dropData = {
                id: dropId, city: state.selectedCity, title: document.getElementById('admin_title').value,
                vibe: document.getElementById('admin_vibe').value, eventTime: new Date(document.getElementById('admin_time').value).getTime(),
                scenes: document.getElementById('admin_scenes').value.split('\n').filter(s => s.trim()).map(s => ({ text: s, vibe: "Intensiv" })),
                phase: 'live', activeSceneIndex: 0, sceneStartTime: Date.now(), readyVotes: [], isActive: true
            };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'drops', 'current_' + state.selectedCity.toLowerCase()), dropData);
            state.isAdmin = false; render(true);
        };

        window.enterRoomFlow = () => {
            state.myAlias = "Stranger " + Math.floor(Math.random() * 999);
            state.myRole = ROLES[Math.floor(Math.random() * ROLES.length)];
            state.isRevealing = true; render(true);
            setTimeout(() => { state.isRevealing = false; state.view = 'room'; render(true); }, 3000);
        };

        window.voteReady = async () => {
            if (!state.user || !state.currentDrop) return;
            const dropRef = doc(db, 'artifacts', appId, 'public', 'data', 'drops', 'current_' + state.selectedCity.toLowerCase());
            await updateDoc(dropRef, { readyVotes: arrayUnion(state.user.uid) });
            if ((state.currentDrop.readyVotes?.length || 0) + 1 >= 2) {
                let next = (state.currentDrop.activeSceneIndex + 1) % state.currentDrop.scenes.length;
                await updateDoc(dropRef, { activeSceneIndex: next, sceneStartTime: Date.now(), readyVotes: [] });
            }
        };

        // --- RENDERER ---
        function render(force = false) {
            const root = document.getElementById('app');
            if (!force && document.activeElement.tagName === 'INPUT') return;

            let html = `
                <nav class="p-6 flex justify-between items-center max-w-5xl mx-auto w-full">
                    <div onclick="state.logoClicks++; if(state.logoClicks>=5){state.isAdmin=true; render(true);}" class="text-2xl font-black serif italic gold-text cursor-pointer">The Plot.</div>
                    <div class="flex gap-4 items-center">
                        <select onchange="window.changeCity(event)" class="bg-transparent text-[10px] uppercase tracking-widest border border-zinc-800 rounded px-2 py-1 outline-none">
                            ${CITIES.map(c => `<option value="${c}" ${state.selectedCity === c ? 'selected' : ''}>${c}</option>`).join('')}
                        </select>
                        ${state.user ? `<button onclick="state.view='home'; render(true);" class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Menu</button>` : ''}
                    </div>
                </nav>
            `;

            if (state.view === 'loading') {
                html += `<div class="flex-1 flex items-center justify-center"><div class="animate-spin w-8 h-8 border-2 border-amber-500 border-t-transparent rounded-full opacity-30"></div></div>`;
            } else if (state.isAdmin) {
                html += renderAdmin();
            } else if (state.isRevealing) {
                html += renderReveal();
            } else if (state.view === 'room') {
                html += renderRoom();
            } else if (state.view === 'auth') {
                html += renderAuth();
            } else {
                html += renderHome();
            }

            root.innerHTML = html;
        }

        function renderAuth() {
            return `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center animate-fade-in">
                    <h1 class="text-4xl serif italic mb-8">Real Connections.</h1>
                    ${state.authStep === 'phone' ? `
                        <form onsubmit="window.sendSMS(event)" class="w-full max-w-xs space-y-4">
                            <div class="flex gap-2">
                                <select id="auth_prefix" class="bg-zinc-900 border border-zinc-800 rounded-xl px-2 text-sm text-zinc-400"><option value="+49">🇩🇪 +49</option><option value="+43">🇦🇹 +43</option></select>
                                <input id="auth_phone" type="tel" placeholder="Handynummer" required class="flex-1 p-4 bg-zinc-900 border border-zinc-800 rounded-xl outline-none focus:border-amber-500 text-center tracking-widest">
                            </div>
                            <button id="auth_submit_btn" type="submit" class="w-full bg-zinc-100 text-black py-4 rounded-xl font-bold uppercase tracking-widest text-xs">SMS senden</button>
                        </form>
                    ` : `
                        <form onsubmit="window.verifyCode(event)" class="w-full max-w-xs space-y-4">
                            <input id="auth_code" type="text" placeholder="CODE" required class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-xl outline-none focus:border-amber-500 text-center text-2xl tracking-[0.5em] font-mono">
                            <button type="submit" class="w-full bg-amber-600 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-xs">Verify</button>
                        </form>
                    `}
                </div>
            `;
        }

        function renderHome() {
            const drop = state.currentDrop;
            return `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center animate-fade-in">
                    <h1 class="text-6xl serif italic mb-6">${state.selectedCity}.</h1>
                    ${drop ? `
                        <div class="glass p-8 rounded-[32px] max-w-sm w-full border-amber-900/30 paper-texture">
                            <div class="torn-edge"></div>
                            <h2 class="text-2xl serif italic mb-2 gold-text">${drop.title}</h2>
                            <p class="text-zinc-400 text-xs mb-8 italic">"${drop.vibe}"</p>
                            <div id="draggable-ticket" onmousedown="window.startTear(event)" ontouchstart="window.startTear(event)" class="bg-zinc-200 rounded-2xl p-6 text-zinc-900 shadow-xl cursor-grab active:cursor-grabbing transform transition">
                                <div class="text-[9px] uppercase tracking-widest font-black text-zinc-400 mb-4">Official Ticket</div>
                                <div class="text-xl font-black serif">Einlass gewährt</div>
                                <div class="text-[8px] uppercase tracking-widest mt-4 animate-pulse">Nach unten ziehen zum Öffnen</div>
                            </div>
                        </div>
                    ` : `
                        <p class="text-zinc-500 text-sm italic opacity-50">Aktuell ist kein Plot live.</p>
                    `}
                </div>
            `;
        }

        function renderReveal() {
            return `
                <div class="absolute inset-0 z-50 bg-black flex flex-col items-center justify-center p-8 text-center">
                    <div class="w-20 h-20 border-t-2 border-amber-500 rounded-full animate-spin mb-12 opacity-30"></div>
                    <h2 class="text-3xl serif italic gold-text animate-pulse tracking-widest uppercase">Director is casting...</h2>
                    <p class="text-[10px] text-zinc-600 uppercase tracking-[0.3em] mt-6">Deine Identität wird verschleiert.</p>
                </div>
            `;
        }

        function renderRoom() {
            const drop = state.currentDrop;
            const scene = drop.scenes[drop.activeSceneIndex];
            const elapsed = Date.now() - (drop.sceneStartTime || Date.now());
            const progress = Math.min(100, (elapsed / (8 * 60 * 1000)) * 100);

            return `
                <div class="flex-1 flex flex-col p-6 animate-fade-in h-full">
                    <div class="text-center mb-10 pt-4">
                        <div class="text-[10px] text-amber-600 uppercase tracking-widest mb-1">Live Scene</div>
                        <h2 class="text-3xl serif italic text-zinc-200">Szene ${drop.activeSceneIndex + 1}</h2>
                    </div>
                    
                    <div class="flex-1 flex items-center justify-center">
                        <div class="glass w-full max-w-sm rounded-[3rem] p-10 shadow-2xl relative overflow-hidden flex flex-col min-h-[420px] paper-texture">
                            <div class="absolute top-0 left-0 w-full h-1.5 bg-zinc-900">
                                <div class="h-full bg-amber-600 progress-bar-smooth shadow-[0_0_15px_rgba(217,119,6,0.6)]" style="width: ${progress}%"></div>
                            </div>
                            
                            <p class="text-2xl serif italic leading-relaxed text-zinc-100 mb-12 mt-4 flex-1">"${scene.text}"</p>
                            
                            <div class="space-y-4">
                                <div class="bg-black/40 p-4 rounded-2xl border border-zinc-800">
                                    <div class="text-[8px] text-zinc-500 uppercase mb-1">Deine Micro-Rolle</div>
                                    <div class="text-xs text-amber-500 font-bold uppercase tracking-widest">${state.myRole}</div>
                                </div>
                                <button onclick="window.voteReady()" class="w-full py-4 rounded-xl font-bold text-[10px] uppercase tracking-[0.2em] transition ${drop.readyVotes?.includes(state.user.uid) ? 'bg-emerald-900/20 text-emerald-500 border border-emerald-900/50' : 'bg-zinc-800 text-zinc-300 border border-zinc-700'}">
                                    ${drop.readyVotes?.includes(state.user.uid) ? 'Warten auf Crew...' : 'Wir sind bereit'}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 flex justify-between items-center text-[9px] text-zinc-700 uppercase tracking-widest border-t border-zinc-900 pt-6">
                        <div>Actor: ${state.myAlias}</div>
                        <div class="flex items-center gap-2"><div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div> Synchronisiert</div>
                    </div>
                </div>
            `;
        }

        function renderAdmin() {
            return `
                <div class="flex-1 p-8 flex flex-col items-center justify-center animate-fade-in overflow-y-auto">
                    <div class="glass p-8 rounded-[32px] w-full max-w-md">
                        <h2 class="text-2xl serif italic mb-6 gold-text">Director Mode</h2>
                        <form onsubmit="window.createDrop(event)" class="space-y-4">
                            <textarea id="admin_theme" placeholder="KI Thema (z.B. Melancholie)" class="w-full bg-black/40 border border-zinc-800 p-4 rounded-xl text-sm h-20 outline-none"></textarea>
                            <button type="button" onclick="window.generateAIPlot()" class="w-full py-3 bg-amber-900/20 text-amber-500 rounded-xl text-[10px] uppercase font-bold border border-amber-900/50">${state.isAiLoading ? 'KI schreibt...' : '✨ KI Auto-Fill'}</button>
                            <input id="admin_title" placeholder="Titel" class="w-full bg-black/40 border border-zinc-800 p-4 rounded-xl text-sm outline-none">
                            <input id="admin_vibe" placeholder="Vibe" class="w-full bg-black/40 border border-zinc-800 p-4 rounded-xl text-sm outline-none">
                            <input id="admin_time" type="datetime-local" class="w-full bg-black/40 border border-zinc-800 p-4 rounded-xl text-sm outline-none">
                            <textarea id="admin_scenes" placeholder="Szenen (pro Zeile)" class="w-full bg-black/40 border border-zinc-800 p-4 rounded-xl text-sm h-32 outline-none"></textarea>
                            <button type="submit" class="w-full py-4 bg-amber-600 text-black font-bold uppercase text-[10px] rounded-xl">Veröffentlichen</button>
                            <button type="button" onclick="state.isAdmin=false; render(true);" class="w-full text-[10px] text-zinc-600 uppercase py-2">Close</button>
                        </form>
                    </div>
                </div>
            `;
        }

        // --- DRAG LOGIK (DEIN STUB-FEELING) ---
        let startY = 0;
        window.startTear = (e) => {
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            document.addEventListener('mousemove', window.onDrag);
            document.addEventListener('touchmove', window.onDrag);
            document.addEventListener('mouseup', window.endDrag);
            document.addEventListener('touchend', window.endDrag);
        };
        window.onDrag = (e) => {
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            const diff = Math.max(0, y - startY);
            const el = document.getElementById('draggable-ticket');
            if (el) el.style.transform = `translateY(${diff}px) rotate(${diff * 0.02}deg)`;
            if (diff > 220) window.endDrag(e, true);
        };
        window.endDrag = (e, success = false) => {
            document.removeEventListener('mousemove', window.onDrag);
            document.removeEventListener('touchmove', window.onDrag);
            const el = document.getElementById('draggable-ticket');
            if (success) {
                el.style.transform = `translateY(1000px) scale(0.8)`;
                el.style.opacity = '0';
                setTimeout(() => window.enterRoomFlow(), 500);
            } else if (el) { el.style.transform = `translateY(0px)`; }
            startY = 0;
        };

        // --- BOOTSTRAP ---
        window.changeCity = (e) => { state.selectedCity = e.target.value; state.view = 'loading'; render(true); listenToDrop(); };
        window.showToast = (msg, type) => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 glass rounded-xl text-[10px] uppercase font-bold tracking-widest ${type === 'success' ? 'text-emerald-500' : 'text-amber-500'} animate-fade-in shadow-xl`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        };

        async function listenToDrop() {
            const dropRef = doc(db, 'artifacts', appId, 'public', 'data', 'drops', 'current_' + state.selectedCity.toLowerCase());
            onSnapshot(dropRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    if (state.view === 'room' && data.activeSceneIndex !== state.currentDrop?.activeSceneIndex) {
                        state.isRevealing = true; setTimeout(() => { state.isRevealing = false; render(true); }, 2000);
                    }
                    state.currentDrop = data;
                } else { state.currentDrop = null; }
                if (state.view === 'loading') state.view = 'home';
                render(true);
            });
        }

        onAuthStateChanged(auth, user => {
            state.user = user;
            if (user) listenToDrop();
            else { state.view = 'auth'; render(true); }
        });

        setInterval(() => { if (state.view === 'room') render(true); }, 1000);
    </script>
</body>
</html>
